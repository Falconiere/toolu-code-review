name: 'Toolu AI Code Review'
description: |
  Automated AI code review for pull requests. Reviews every changed file
  against an 8-dimension checklist (correctness, security, performance, test
  coverage, doc accuracy, tight assertions, migration warnings, and adherence
  to the project's own convention files read from the base ref) and posts a
  structured verdict with actionable findings. Runs on OpenRouter (any
  OpenAI-compatible model) or the native DeepSeek API, via the Vercel AI SDK
  with structured-output validation and retries.
author: 'Falconiere'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  PROVIDER:
    description: 'LLM backend: "openrouter" (default — any OpenAI-compatible model via OpenRouter) or "deepseek" (native api.deepseek.com). Any other value fails with an error.'
    required: false
    default: 'openrouter'
  MODEL_ID:
    description: 'Model id for the chosen provider. Defaults per provider: openrouter -> deepseek/deepseek-v4-pro, deepseek -> deepseek-v4-flash. Use a "<vendor>/<model>" id for OpenRouter; a bare id like "deepseek-v4-flash" for native DeepSeek.'
    required: false
  API_KEY:
    description: 'API key for the chosen provider (Authorization: Bearer). Required. Prefer passing via a step-level env: block for better secret hygiene.'
    required: true
  MAX_TOKENS:
    description: 'Max completion tokens per request. Always sent — omitting it makes the provider reserve the model''s full output capacity against your credit budget. A truncated (finish_reason "length") chunk is retried with a doubled budget up to 32768.'
    required: false
    default: '8192'
  MIN_CONFIDENCE:
    description: 'Drop findings below this confidence unless severity is blocker/high. One of: high, medium'
    required: false
    default: 'high'
  INLINE_COMMENTS:
    description: 'When true, post per-line review comments (with committable code suggestions) via the GitHub Reviews API, in addition to the summary comment. Set false for summary-only'
    required: false
    default: 'true'
  MANAGE_LABELS:
    description: 'When true, set a real PR label chip matching the verdict (merge-approved / request-changes) and remove the opposite one. Requires issues: write. Set false to leave PR labels untouched'
    required: false
    default: 'true'
  BASE_BRANCH:
    description: 'Base branch for diff comparison'
    required: false
    default: 'main'
  REVIEW_PROMPT_FILE:
    description: 'Path to a markdown file (relative to repo root) containing a custom review prompt. Overrides the default 8-dimension checklist. Project conventions are still gathered and injected for the custom prompt to use.'
    required: false
  CODEBASE_OVERVIEW:
    description: 'High-level description of the codebase (framework, patterns, business context) to give the reviewer context'
    required: false
  CHECK_PROJECT_RULES:
    description: 'When true (default), auto-read the repo''s own convention files from the BASE ref (CLAUDE.md, AGENTS.md, .cursor/rules, .cursorrules, .windsurfrules, .github/copilot-instructions.md, plus CONVENTIONS.md/CONTRIBUTING.md/docs/conventions) and review the diff against them via the CONVENTION ADHERENCE dimension. Reading from the base ref means a PR cannot inject rules. Set false to disable.'
    required: false
    default: 'true'
  RULES_GLOB:
    description: 'Extra path globs (relative to repo root, newline- or comma-separated) to include as project rules, e.g. "docs/architecture/**". Matched against tracked files at the base ref. Empty (default) = the well-known convention files only.'
    required: false
    default: ''
  EXCLUDE_GLOBS:
    description: 'Extra path globs (relative to repo root, newline- or comma-separated) to EXCLUDE from the AI review diff, on top of the built-in generated/vendored/lockfile set and any .gitattributes linguist-generated paths. e.g. "migrations/**, **/*.snap". Excluded files are still committed and CI-checked; they are only kept out of the LLM review.'
    required: false
    default: ''
  RULES_MAX_BYTES:
    description: 'Total byte cap on the gathered project-rules text. Files are added in priority order until the cap; whole files past it are dropped with a truncation notice. Default: 32768.'
    required: false
    default: '32768'
  MAX_FILES:
    description: 'Maximum number of changed files before the action skips. 0 (default) = unlimited; the only ceiling is your OpenRouter billing balance. Set a positive value to opt into a hard skip.'
    required: false
    default: '0'
  MAX_DIFF_LINES:
    description: 'Maximum diff lines before truncation (first N lines kept, lexicographic by file path). 0 (default) = unlimited; review the whole diff. Set a positive value to opt into truncation. Applied BEFORE chunking.'
    required: false
    default: '0'
  MAX_CHUNK_LINES:
    description: 'Per-chunk diff-line budget. When the diff exceeds this, it is split into chunks of whole files (≤ this many primed lines each) reviewed in separate model calls and merged — so large PRs no longer overwhelm one call. 0 = never chunk (single call). Default 1500.'
    required: false
    default: '1500'
  MAX_CHUNKS:
    description: 'Maximum number of chunks (= model calls) per review, bounding cost and wall-clock on very large PRs. Files beyond the limit are not reviewed and the comment says so. 0 = unlimited. Default 20.'
    required: false
    default: '20'
  REQUEST_TIMEOUT_MS:
    description: 'Per-attempt model deadline in milliseconds. Each chunk gets up to this long per attempt (retried a few times) before it is aborted and the chunk abstains ("This operation was aborted"). Raise it for slow/large models, lower it to fail faster. Default 180000 (3 min).'
    required: false
    default: '180000'
  TOKEN:
    description: 'GitHub token for posting/editing comments'
    required: false
    default: '${{ github.token }}'
  APP_ID:
    description: 'GitHub App id. Set together with APP_PRIVATE_KEY to post review comments as a custom-branded App ("Toolu - Code Review") instead of github-actions[bot]. Both must be set or the action falls back to the default identity.'
    required: false
  APP_PRIVATE_KEY:
    description: 'GitHub App private key. Accepts the raw PEM or a base64-encoded PEM (auto-decoded) — base64 is handy for storing a multiline key in a single-line secret. Pair with APP_ID. Pass via a secret; never inline. Used only to mint a short-lived installation token — never logged.'
    required: false
  TRIGGER_PHRASE:
    description: 'Mention prefix that re-triggers a review from a PR comment, e.g. "@toolu review focus on auth". Requires the workflow to also listen on issue_comment.'
    required: false
    default: '@toolu'
  MIN_TRIGGER_PERMISSION:
    description: 'Minimum repo permission a commenter needs to trigger a review via @mention: write or admin. The check fails closed (denied on any error).'
    required: false
    default: 'write'
  BOT_NAME:
    description: 'Display name shown in the comment body header.'
    required: false
    default: 'Toolu — Code Review'
  BOT_LOGO_URL:
    description: 'Logo image shown in the comment body header.'
    required: false
    default: 'https://raw.githubusercontent.com/falconiere/toolu-ghactions/main/code-review/assets/logo.png'
  REVIEW_MEMORY:
    description: 'When true, recap what changed since the last review (resolved / still-open / new) and keep a collapsed history, using a hidden state marker in the sticky comment. Set false to disable memory.'
    required: false
    default: 'true'
  VERBOSITY:
    description: 'Verdict-comment verbosity: "compact" (default) collapses the checklist to a single line and renders recap buckets as `path:line` refs; "full" restores the multi-line checklist and inline recap text. Findings, the Findings heading, and the state marker are identical in both modes. Any other value warns and falls back to compact.'
    required: false
    default: 'compact'
  FAIL_ON:
    description: 'Comma-separated verdicts that FAIL the job (turning this check red so branch protection can block the PR): changes, error, or both. Defaults to "changes" — the job goes red when the bot requests changes. Set "none" to keep the job green on every verdict (advisory only), or "changes,error" to also block when the review could not run. The comment, label, and outputs are posted regardless; only the exit code changes. This governs the verdict-driven gate only; a thrown infra error still fails the job regardless of FAIL_ON. Mark this check Required in branch protection for the red to block.'
    required: false
    default: 'changes'
  RUN_SECRET_SCAN:
    description: 'Run the deterministic secret scan (gitleaks) before the LLM review. Its findings feed the LLM as triage context and upload to the Code Scanning tab. Set false to skip.'
    required: false
    default: 'true'
  RUN_SAST:
    description: 'Run the deterministic SAST pass (Opengrep) before the LLM review. Its findings feed the LLM as triage context and upload to the Code Scanning tab. Set false to skip.'
    required: false
    default: 'true'
  SAST_RULES:
    description: 'Opengrep rule config(s) for the SAST pass (comma-separated). Default: p/typescript.'
    required: false
    default: 'p/typescript'

outputs:
  verdict:
    description: 'Review verdict: approved, changes, skip, or error'
    value: ${{ steps.review.outputs.verdict }}
  findings-count:
    description: 'Number of findings reported'
    value: ${{ steps.review.outputs.findings-count }}
  comment-url:
    description: 'URL of the posted verdict comment'
    value: ${{ steps.review.outputs.comment-url }}

runs:
  using: 'composite'
  steps:
    # --- Deterministic scanners run FIRST; their SARIF feeds the LLM as triage context
    # and uploads to the Code Scanning tab. Every scanner step is best-effort
    # (continue-on-error / `|| true`): a scanner or install failure degrades to an
    # LLM-only review — it must never break the consumer's PR. ---
    - name: Install scanners (pinned release binaries)
      shell: bash
      continue-on-error: true
      run: |
        set -u
        mkdir -p "$RUNNER_TEMP/toolu-bin"
        # gitleaks (MIT, free, NO org license — unlike gitleaks-action). Pinned release.
        GL_VERSION=8.30.1
        curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
          | tar -xz -C "$RUNNER_TEMP/toolu-bin" gitleaks \
          || echo "::warning::gitleaks install failed — secret scan will be skipped"
        # Opengrep (LGPL, unrestricted rules). Pinned release binary.
        OG_VERSION=v1.22.0
        curl -fsSL -o "$RUNNER_TEMP/toolu-bin/opengrep" \
          "https://github.com/opengrep/opengrep/releases/download/${OG_VERSION}/opengrep_manylinux_x86" \
          && chmod +x "$RUNNER_TEMP/toolu-bin/opengrep" \
          || echo "::warning::opengrep install failed — SAST will be skipped"
        echo "$RUNNER_TEMP/toolu-bin" >> "$GITHUB_PATH"
    - name: Secret scan (gitleaks → SARIF)
      if: ${{ inputs.RUN_SECRET_SCAN == 'true' }}
      shell: bash
      run: |
        # --no-git: scan the checked-out tree, NOT the full history (which re-flags
        # long-deleted files). --config: allowlist build output / deps (bundled dep
        # test keys are not real secrets).
        command -v gitleaks >/dev/null \
          && gitleaks detect --source . --no-git --no-banner \
               --config "$GITHUB_ACTION_PATH/gitleaks.toml" --report-format sarif \
               --report-path "$RUNNER_TEMP/gitleaks.sarif" --exit-code 0 \
          || true
    - name: SAST (opengrep → SARIF)
      if: ${{ inputs.RUN_SAST == 'true' }}
      shell: bash
      run: |
        # Exclude build output / deps — they are generated, not reviewed (mirrors the
        # review's own noise filter), and a bundled dist would otherwise dominate the scan.
        command -v opengrep >/dev/null \
          && opengrep scan --sarif --output "$RUNNER_TEMP/opengrep.sarif" \
               --config "${{ inputs.SAST_RULES }}" \
               --exclude dist --exclude build --exclude node_modules . \
          || true
    - name: Upload SARIF to Code Scanning
      if: ${{ always() }}
      continue-on-error: true   # fork PRs / missing `security-events: write` → skip; the review still runs
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ runner.temp }}
    - name: AI review (LLM judgment — triages the deterministic findings)
      id: review
      shell: bash
      run: node "$GITHUB_ACTION_PATH/dist/index.cjs"
      env:
        # The node action reads inputs via @actions/core.getInput (process.env.INPUT_*).
        # Composite run-steps do NOT auto-expose inputs, so map each one explicitly.
        INPUT_PROVIDER: ${{ inputs.PROVIDER }}
        INPUT_MODEL_ID: ${{ inputs.MODEL_ID }}
        INPUT_API_KEY: ${{ inputs.API_KEY }}
        INPUT_MAX_TOKENS: ${{ inputs.MAX_TOKENS }}
        INPUT_MIN_CONFIDENCE: ${{ inputs.MIN_CONFIDENCE }}
        INPUT_INLINE_COMMENTS: ${{ inputs.INLINE_COMMENTS }}
        INPUT_MANAGE_LABELS: ${{ inputs.MANAGE_LABELS }}
        INPUT_BASE_BRANCH: ${{ inputs.BASE_BRANCH }}
        INPUT_REVIEW_PROMPT_FILE: ${{ inputs.REVIEW_PROMPT_FILE }}
        INPUT_CODEBASE_OVERVIEW: ${{ inputs.CODEBASE_OVERVIEW }}
        INPUT_CHECK_PROJECT_RULES: ${{ inputs.CHECK_PROJECT_RULES }}
        INPUT_RULES_GLOB: ${{ inputs.RULES_GLOB }}
        INPUT_EXCLUDE_GLOBS: ${{ inputs.EXCLUDE_GLOBS }}
        INPUT_RULES_MAX_BYTES: ${{ inputs.RULES_MAX_BYTES }}
        INPUT_MAX_FILES: ${{ inputs.MAX_FILES }}
        INPUT_MAX_DIFF_LINES: ${{ inputs.MAX_DIFF_LINES }}
        INPUT_MAX_CHUNK_LINES: ${{ inputs.MAX_CHUNK_LINES }}
        INPUT_MAX_CHUNKS: ${{ inputs.MAX_CHUNKS }}
        INPUT_REQUEST_TIMEOUT_MS: ${{ inputs.REQUEST_TIMEOUT_MS }}
        INPUT_TOKEN: ${{ inputs.TOKEN }}
        INPUT_APP_ID: ${{ inputs.APP_ID }}
        INPUT_APP_PRIVATE_KEY: ${{ inputs.APP_PRIVATE_KEY }}
        INPUT_TRIGGER_PHRASE: ${{ inputs.TRIGGER_PHRASE }}
        INPUT_MIN_TRIGGER_PERMISSION: ${{ inputs.MIN_TRIGGER_PERMISSION }}
        INPUT_BOT_NAME: ${{ inputs.BOT_NAME }}
        INPUT_BOT_LOGO_URL: ${{ inputs.BOT_LOGO_URL }}
        INPUT_REVIEW_MEMORY: ${{ inputs.REVIEW_MEMORY }}
        INPUT_FAIL_ON: ${{ inputs.FAIL_ON }}
        INPUT_VERBOSITY: ${{ inputs.VERBOSITY }}
        # Where the scanner steps wrote their SARIF — the node action reads + triages it.
        TOOLU_SARIF_DIR: ${{ runner.temp }}
        # The default GITHUB_TOKEN for the @actions/github client (TOKEN input overrides downstream).
        GITHUB_TOKEN: ${{ inputs.TOKEN }}
