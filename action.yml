name: 'Toolu AI Code Review'
description: |
  Automated AI code review for pull requests. Reviews every changed file
  against an 8-dimension checklist (correctness, security, performance, test
  coverage, doc accuracy, tight assertions, migration warnings, and adherence
  to the project's own convention files read from the base ref) and posts a
  structured verdict with actionable findings. Supports 6 AI vendors
  (OpenRouter, OpenAI, Anthropic, DeepSeek, Moonshot, MiniMax) with parallel
  ensemble review and configurable merge strategies.
author: 'Falconiere'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  PROVIDERS:
    description: 'JSON array of {provider, model, api_key, enforce_json_schema?, max_tokens?} entries. Providers: openrouter, openai, anthropic, deepseek, moonshot, minimax. Overrides legacy single-provider inputs.'
    required: false
  MERGE_STRATEGY:
    description: 'Strategy to merge N provider verdicts: conservative (any changes wins), majority (ceil(N/2)+1 changes required), all_approve (all must approve). Default: conservative'
    required: false
    default: 'conservative'
  OPENROUTER_API_KEY:
    description: 'OpenRouter API key. Prefer passing via step-level env: block for better secret hygiene. Legacy single-provider input; use PROVIDERS for multi-provider configurations.'
    required: false
  MODEL:
    description: 'OpenRouter model identifier'
    required: false
    default: 'deepseek/deepseek-v4-flash'
  FALLBACK_MODEL:
    description: 'DEPRECATED: Dropped in multi-provider mode. Use PROVIDERS array to configure multiple models.'
    required: false
    default: 'anthropic/claude-sonnet-4-5'
  MAX_TOKENS:
    description: 'Max completion tokens per request. Always sent — omitting it makes OpenRouter reserve the model''s full output capacity against your credit budget'
    required: false
    default: '4096'
  REVIEW_MODE:
    description: 'DEPRECATED: No-op. Previously parallel=single vs parallel=multi-dimension; multi-provider ensemble review replaces this. Kept for backward compatibility.'
    required: false
    default: 'parallel'
  MIN_CONFIDENCE:
    description: 'Drop findings below this confidence unless severity is blocker/high. One of: high, medium'
    required: false
    default: 'high'
  ENFORCE_JSON_SCHEMA:
    description: 'When true, requests use response_format json_schema + provider.require_parameters (routes only to providers that support it). Set false to allow free-text + regex fallback'
    required: false
    default: 'true'
  INLINE_COMMENTS:
    description: 'When true, post per-line review comments (with committable code suggestions) via the GitHub Reviews API, in addition to the summary comment. Set false for summary-only'
    required: false
    default: 'true'
  MANAGE_LABELS:
    description: 'When true, set a real PR label chip matching the verdict (agent-merge-approved / agent-request-changes) and remove the opposite one. Requires issues: write. Set false to leave PR labels untouched'
    required: false
    default: 'true'
  BASE_BRANCH:
    description: 'Base branch for diff comparison'
    required: false
    default: 'main'
  REVIEW_PROMPT_FILE:
    description: 'Path to a markdown file (relative to repo root) containing a custom review prompt. Overrides the default 8-dimension checklist. Project conventions are still gathered and injected for the custom prompt to use.'
    required: false
  CODEBASE_OVERVIEW:
    description: 'High-level description of the codebase (framework, patterns, business context) to give the reviewer context'
    required: false
  CHECK_PROJECT_RULES:
    description: 'When true (default), auto-read the repo''s own convention files from the BASE ref (CLAUDE.md, AGENTS.md, .cursor/rules, .cursorrules, .windsurfrules, .github/copilot-instructions.md, plus CONVENTIONS.md/CONTRIBUTING.md/docs/conventions) and review the diff against them via the CONVENTION ADHERENCE dimension. Reading from the base ref means a PR cannot inject rules. Set false to disable.'
    required: false
    default: 'true'
  RULES_GLOB:
    description: 'Extra path globs (relative to repo root, newline- or comma-separated) to include as project rules, e.g. "docs/architecture/**". Matched against tracked files at the base ref. Empty (default) = the well-known convention files only.'
    required: false
    default: ''
  RULES_MAX_BYTES:
    description: 'Total byte cap on the gathered project-rules text. Files are added in priority order until the cap; whole files past it are dropped with a truncation notice. Default: 32768.'
    required: false
    default: '32768'
  MAX_FILES:
    description: 'Maximum number of changed files before the action skips. 0 (default) = unlimited; the only ceiling is your OpenRouter billing balance. Set a positive value to opt into a hard skip.'
    required: false
    default: '0'
  MAX_DIFF_LINES:
    description: 'Maximum diff lines before truncation (first N lines kept, lexicographic by file path). 0 (default) = unlimited; review the whole diff. Set a positive value to opt into truncation.'
    required: false
    default: '0'
  TOKEN:
    description: 'GitHub token for posting/editing comments'
    required: false
    default: '${{ github.token }}'
  APP_ID:
    description: 'GitHub App id. Set together with APP_PRIVATE_KEY to post review comments as a custom-branded App ("Toolu - Code Review") instead of github-actions[bot]. Both must be set or the action falls back to the default identity.'
    required: false
  APP_PRIVATE_KEY:
    description: 'GitHub App private key. Accepts the raw PEM or a base64-encoded PEM (auto-decoded) — base64 is handy for storing a multiline key in a single-line secret. Pair with APP_ID. Pass via a secret; never inline. Used only to mint a short-lived installation token — never logged.'
    required: false
  TRIGGER_PHRASE:
    description: 'Mention prefix that re-triggers a review from a PR comment, e.g. "@toolu review focus on auth". Requires the workflow to also listen on issue_comment.'
    required: false
    default: '@toolu'
  MIN_TRIGGER_PERMISSION:
    description: 'Minimum repo permission a commenter needs to trigger a review via @mention: write or admin. The check fails closed (denied on any error).'
    required: false
    default: 'write'
  BOT_NAME:
    description: 'Display name shown in the comment body header.'
    required: false
    default: 'Toolu — Code Review'
  BOT_LOGO_URL:
    description: 'Logo image shown in the comment body header.'
    required: false
    default: 'https://raw.githubusercontent.com/falconiere/toolu-ghactions/main/code-review/assets/logo.png'
  REVIEW_MEMORY:
    description: 'When true, recap what changed since the last review (resolved / still-open / new) and keep a collapsed history, using a hidden state marker in the sticky comment. Set false to disable memory.'
    required: false
    default: 'true'

outputs:
  verdict:
    description: 'Review verdict: approved, changes, skip, or error'
  findings-count:
    description: 'Number of findings reported'
  comment-url:
    description: 'URL of the posted verdict comment'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/falconiere/toolu-ghactions/code-review:v2'
  env:
    GITHUB_TOKEN: ${{ inputs.TOKEN }}
