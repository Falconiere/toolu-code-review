# gitleaks config for the code-review action's secret scan. Extends the default
# rules but allowlists build output + deps: bundled dependency test keys (e.g. in a
# committed dist bundle) are not real secrets, and scanning them only produces noise —
# mirroring how the review's noise filter already drops dist/build output.
[extend]
useDefault = true

[allowlist]
description = "Ignore build output, bundles, and dependencies"
paths = ['''(^|/)dist/''', '''(^|/)build/''', '''(^|/)node_modules/''']
